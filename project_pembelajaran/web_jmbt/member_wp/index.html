<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEMBER" WP</title>
    <meta name="language" content="id">

    <!-- Favicon -->
    <link rel="icon" href="image/logo.png" type="image/png">

    <!-- CSS & Fonts -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Canvas / overlay -->
    <canvas id="matrix-rain" style="display: none;"></canvas>
    <canvas class="canvas" style="position:absolute;width:100%;height:100%;z-index:9999;display:none;"></canvas>

    <div class="overlay">
        <!-- Stars -->
        <div class="stars-container" id="starsContainer"></div>

        <!-- Klik Foto -->
        <img id="gift-image" src="assets/foto/wp.png"
            style="position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            max-width: 50%; max-height: 50%;
            z-index: 1000;
            cursor: pointer;" />

        <!-- Text -->
        <div class="content-display" id="contentDisplay">
            <p id="contentText"></p>
        </div>

        <!-- Firework / Book -->
        <div class="firework-container" id="fireworkContainer"></div>
        <div class="book-container">
            <div class="book" id="book"></div>
        </div>

        <!-- Music -->
        <button class="music-control" id="musicControl" title="Play/Pause Music">▶</button>
        <audio id="birthdayAudio" loop>
            <source src="assets/lagu/kasih_putih.mp3" type="audio/mpeg">
        </audio>

        <!-- Orientation lock -->
        <div id="orientation-lock">
            <div class="phone-icon">
                <img src="image/screen.png" alt="">
            </div>
        </div>

        <!-- Fullscreen button -->
        <button id="fullscreenBtn" style="position: fixed; bottom: 20px; right: 20px; z-index: 990010; padding: 10px 18px; border-radius: 8px; border: none; background: #222; color: #fff; font-size: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); cursor: pointer; display: none;">
            <img style="width: 20px; height: 20px; vertical-align: middle;" src="image/full.png" alt="">
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
